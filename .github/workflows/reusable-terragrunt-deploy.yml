name: Reusable Terragrunt Deployment

on:
  workflow_call:
    inputs:
      unit:
        description: Terragrunt unit to apply
        type: string
        required: true
      environment:
        description: Terragrunt environment directory to run against
        type: string
        required: true
      plan_environment:
        description: GitHub environment used for plan variables
        type: string
        required: false
        default: ""
      apply_environment:
        description: GitHub environment used for apply protection rules and variables
        type: string
        required: false
        default: ""
      apply_changes:
        description: Whether to apply planned infrastructure changes
        type: boolean
        required: false
        default: true
      is_destroy:
        description: Whether to destroy infrastructure
        type: boolean
        required: false
        default: false

jobs:
  terragrunt-plan:
    name: Terragrunt Unit Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.plan_environment || inputs.environment }}
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: plan-${{ inputs.environment }}-${{ inputs.unit }}
      cancel-in-progress: false
    env:
      ROLE_TO_ASSUME: ${{ vars.ROLE_TO_ASSUME }}
      ROLE_SESSION_NAME: ${{ vars.ROLE_SESSION_NAME || format('github-actions-{0}', github.run_id) }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      GITHUB_ENVIRONMENT_NAME: ${{ inputs.plan_environment || inputs.environment }}
      TERRAFORM_ENVIRONMENT: ${{ inputs.environment }}
      UNIT: ${{ inputs.unit }}
      IS_DESTROY: ${{ inputs.is_destroy }}
      DESTROY_FLAG: ${{ inputs.is_destroy && '-destroy' || '' }}
      PLAN_MODE: ${{ inputs.is_destroy && 'destroy' || 'apply' }}
      PLAN_OUTPUT_FILE: terraform-plan-output.txt
      PLAN_METADATA_FILE: terraform-plan-metadata.env
      DEPENDENCIES_LAYER_FILE: .build/dependencies.zip
      PLAN_SUMMARY_LINES: "500"
      PYTHON_VERSION: "3.14"
      TF_VERSION: "1.14.0"
      TERRAGRUNT_VERSION: "0.82.4"
      WORKING_DIRECTORY: terraform/environments/${{ inputs.environment }}/${{ inputs.unit }}
      TF_IN_AUTOMATION: "true"
    outputs:
      exitcode: ${{ steps.plan-terragrunt.outputs.exitcode }}

    steps:
      - name: Checkout Repository
        id: checkout-repository
        uses: actions/checkout@v7

      - name: Set Up Python
        id: set-up-python
        if: ${{ inputs.unit == 'api' }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set Up Terraform
        id: set-up-terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set Up Terragrunt
        id: set-up-terragrunt
        uses: gruntwork-io/terragrunt-action@v3.4.0
        with:
          tg_version: ${{ env.TERRAGRUNT_VERSION }}
          tf_path: terraform

      - name: Configure AWS Credentials
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          role-session-name: ${{ env.ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Initialize Terragrunt
        id: initialize-terragrunt
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: terragrunt init -reconfigure -no-color

      - name: Plan Terragrunt Changes
        id: plan-terragrunt
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          set +e

          terragrunt plan $DESTROY_FLAG -detailed-exitcode -no-color > "$PLAN_OUTPUT_FILE" 2>&1

          exitcode=$?
          echo "exitcode=${exitcode}"

          echo "exitcode=${exitcode}" >> "$GITHUB_OUTPUT"

          if [ "${exitcode}" -eq 2 ]; then
            total_lines=$(wc -l < "$PLAN_OUTPUT_FILE" | tr -d ' ')

            echo "### Terragrunt Plan Output - ${TERRAFORM_ENVIRONMENT}/${UNIT}" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Click to expand</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```terraform' >> "$GITHUB_STEP_SUMMARY"
            head -n "$PLAN_SUMMARY_LINES" "$PLAN_OUTPUT_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if [ "$total_lines" -gt "$PLAN_SUMMARY_LINES" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "_Plan output truncated to ${PLAN_SUMMARY_LINES} lines. See the readable plan output artifact for the full text._" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Full readable plan output is uploaded as a workflow artifact._" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${exitcode}" -eq 1 ]; then
            echo "Terragrunt plan failed."
            cat "$PLAN_OUTPUT_FILE"
            exit 1
          else
            exit 0
          fi

      - name: Upload Terraform Plan Artifact
        id: upload-terraform-plan-artifact
        if: ${{ steps.plan-terragrunt.outputs.exitcode == '0' || steps.plan-terragrunt.outputs.exitcode == '2' }}
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan-${{ env.TERRAFORM_ENVIRONMENT }}-${{ env.UNIT }}-${{ env.PLAN_MODE }}
          path: ${{ env.WORKING_DIRECTORY }}/terraform.plan
          if-no-files-found: error
          retention-days: 7

      - name: Write Terraform Plan Metadata
        id: write-terraform-plan-metadata
        if: ${{ steps.plan-terragrunt.outputs.exitcode == '0' || steps.plan-terragrunt.outputs.exitcode == '2' }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          {
            echo "github_sha=${GITHUB_SHA}"
            echo "github_ref=${GITHUB_REF}"
            echo "github_environment=${GITHUB_ENVIRONMENT_NAME}"
            echo "terraform_environment=${TERRAFORM_ENVIRONMENT}"
            echo "unit=${UNIT}"
            echo "plan_mode=${PLAN_MODE}"
            echo "is_destroy=${IS_DESTROY}"
          } > "$PLAN_METADATA_FILE"

      - name: Upload Terraform Plan Metadata Artifact
        id: upload-terraform-plan-metadata-artifact
        if: ${{ steps.plan-terragrunt.outputs.exitcode == '0' || steps.plan-terragrunt.outputs.exitcode == '2' }}
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan-metadata-${{ env.TERRAFORM_ENVIRONMENT }}-${{ env.UNIT }}-${{ env.PLAN_MODE }}
          path: ${{ env.WORKING_DIRECTORY }}/${{ env.PLAN_METADATA_FILE }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload Dependencies Layer Artifact
        id: upload-dependencies-layer-artifact
        if: ${{ inputs.unit == 'api' && steps.plan-terragrunt.outputs.exitcode == '2' }}
        uses: actions/upload-artifact@v6
        with:
          name: dependencies-layer-${{ env.TERRAFORM_ENVIRONMENT }}-${{ env.UNIT }}-${{ env.PLAN_MODE }}
          path: ${{ env.DEPENDENCIES_LAYER_FILE }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload Terraform Plan Output Artifact
        id: upload-terraform-plan-output-artifact
        if: ${{ steps.plan-terragrunt.outputs.exitcode == '0' || steps.plan-terragrunt.outputs.exitcode == '2' }}
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan-output-${{ env.TERRAFORM_ENVIRONMENT }}-${{ env.UNIT }}-${{ env.PLAN_MODE }}
          path: ${{ env.WORKING_DIRECTORY }}/${{ env.PLAN_OUTPUT_FILE }}
          if-no-files-found: error
          retention-days: 7

      - name: Publish Plan Only Summary
        id: publish-plan-only-summary
        if: ${{ !inputs.apply_changes && steps.plan-terragrunt.outputs.exitcode == '2' }}
        run: |
          echo "### Infrastructure changes planned for ${TERRAFORM_ENVIRONMENT}/${UNIT}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Apply was skipped because this workflow is plan-only." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish No Changes Summary
        id: publish-no-changes-summary
        if: ${{ steps.plan-terragrunt.outputs.exitcode == '0' }}
        run: |
          echo "### No infrastructure changes for ${TERRAFORM_ENVIRONMENT}/${UNIT}" >> "$GITHUB_STEP_SUMMARY"

  terragrunt-apply:
    name: Terragrunt Unit Apply
    needs: terragrunt-plan
    if: ${{ inputs.apply_changes && needs.terragrunt-plan.outputs.exitcode == '2' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.apply_environment || inputs.environment }}
    permissions:
      actions: read
      contents: read
      id-token: write
    concurrency:
      group: deploy-${{ inputs.environment }}-${{ inputs.unit }}
      cancel-in-progress: false
    env:
      ROLE_TO_ASSUME: ${{ vars.ROLE_TO_ASSUME }}
      ROLE_SESSION_NAME: ${{ vars.ROLE_SESSION_NAME || format('github-actions-{0}', github.run_id) }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      TERRAFORM_ENVIRONMENT: ${{ inputs.environment }}
      UNIT: ${{ inputs.unit }}
      PLAN_MODE: ${{ inputs.is_destroy && 'destroy' || 'apply' }}
      DEPENDENCIES_LAYER_DIRECTORY: .build
      DEPENDENCIES_LAYER_FILE: .build/dependencies.zip
      PYTHON_VERSION: "3.14"
      TF_VERSION: "1.14.0"
      TERRAGRUNT_VERSION: "0.82.4"
      WORKING_DIRECTORY: terraform/environments/${{ inputs.environment }}/${{ inputs.unit }}
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout Repository
        id: checkout-repository
        uses: actions/checkout@v7

      - name: Set Up Python
        id: set-up-python
        if: ${{ inputs.unit == 'api' }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set Up Terraform
        id: set-up-terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set Up Terragrunt
        id: set-up-terragrunt
        uses: gruntwork-io/terragrunt-action@v3.4.0
        with:
          tg_version: ${{ env.TERRAGRUNT_VERSION }}
          tf_path: terraform

      - name: Configure AWS Credentials
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          role-session-name: ${{ env.ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Initialize Terragrunt
        id: initialize-terragrunt
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: terragrunt init -reconfigure -no-color

      - name: Download Terraform Plan Artifact
        id: download-terraform-plan-artifact
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-${{ env.TERRAFORM_ENVIRONMENT }}-${{ env.UNIT }}-${{ env.PLAN_MODE }}
          path: ${{ env.WORKING_DIRECTORY }}

      - name: Download Dependencies Layer Artifact
        id: download-dependencies-layer-artifact
        if: ${{ inputs.unit == 'api' }}
        uses: actions/download-artifact@v8
        with:
          name: dependencies-layer-${{ env.TERRAFORM_ENVIRONMENT }}-${{ env.UNIT }}-${{ env.PLAN_MODE }}
          path: ${{ env.DEPENDENCIES_LAYER_DIRECTORY }}

      - name: Restore Dependencies Layer In Terragrunt Cache
        id: restore-dependencies-layer-in-terragrunt-cache
        if: ${{ inputs.unit == 'api' }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          set -euo pipefail

          cache_build_dir=".terragrunt-cache/.build"
          mkdir -p "$cache_build_dir"
          cp "${GITHUB_WORKSPACE}/${DEPENDENCIES_LAYER_FILE}" "${cache_build_dir}/dependencies.zip"

      - name: Apply Terragrunt Plan
        id: apply-terragrunt
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          TERRAGRUNT_OUTPUT=$(terragrunt apply -auto-approve -no-color terraform.plan)

          delimiter="$(openssl rand -hex 8)"
          echo "summary<<${delimiter}" >> "$GITHUB_OUTPUT"
          echo "### Terragrunt Apply Output - ${TERRAFORM_ENVIRONMENT}/${UNIT}" >> "$GITHUB_OUTPUT"
          echo "<details><summary>Click to expand</summary>" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo '```terraform' >> "$GITHUB_OUTPUT"
          echo "$TERRAGRUNT_OUTPUT" >> "$GITHUB_OUTPUT"
          echo '```' >> "$GITHUB_OUTPUT"
          echo "</details>" >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Publish Apply Summary
        id: publish-apply-summary
        env:
          SUMMARY: ${{ steps.apply-terragrunt.outputs.summary }}
        run: |
          echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
