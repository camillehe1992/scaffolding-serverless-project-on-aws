name: Deploy Development Environment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy-security:
    name: Deploy Security Unit
    uses: ./.github/workflows/reusable-terragrunt-deploy.yml
    with:
      environment: dev
      unit: security

  deploy-dynamodb:
    name: Deploy DynamoDB Unit
    uses: ./.github/workflows/reusable-terragrunt-deploy.yml
    with:
      environment: dev
      unit: dynamodb

  deploy-api:
    name: Deploy API Unit
    needs: [deploy-security, deploy-dynamodb]
    uses: ./.github/workflows/reusable-terragrunt-deploy.yml
    with:
      environment: dev
      unit: api
