# Pre-commit configuration for Terraform/Terragrunt projects
# Install with: pre-commit install
# Run manually with: pre-commit run --all-files

repos:
  # Terragrunt and workflow static checks
  - repo: local
    hooks:
      - id: terragrunt-hclfmt
        name: Terragrunt HCL Format
        entry: bash -c 'terragrunt hcl format --check --diff'
        language: system
        files: \.hcl$
        pass_filenames: false
        description: Check Terragrunt HCL formatting

      - id: tflint
        name: TFLint
        entry: bash -c 'if command -v tflint >/dev/null 2>&1; then tflint --recursive; else echo "tflint not installed; skipping"; fi'
        language: system
        files: ^terraform/.*\.(tf|hcl)$
        pass_filenames: false
        description: Lint Terraform files when tflint is installed

      - id: actionlint
        name: GitHub Actions Lint
        entry: bash -c 'if command -v actionlint >/dev/null 2>&1; then actionlint; else echo "actionlint not installed; skipping"; fi'
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
        description: Lint GitHub Actions workflows when actionlint is installed

  # Additional useful hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        description: Remove trailing whitespace from all files

      - id: end-of-file-fixer
        name: Fix End of Files
        description: Ensure files end with a newline

      - id: check-yaml
        name: Check YAML Syntax
        description: Validate YAML syntax
        args:
          - --unsafe

      - id: check-json
        name: Check JSON Syntax
        description: Validate JSON syntax

      - id: check-merge-conflict
        name: Check Merge Conflicts
        description: Check for unresolved merge conflicts

  # Terraform/Terragrunt specific hooks
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.88.0
    hooks:
      - id: terraform_fmt
        name: Terraform Format
        description: Format Terraform files

      # Keep credentialed Terragrunt/Terraform validation in CI/deploy workflows.
      # This repository's Terragrunt root resolves AWS account data during load.

# Configuration for specific hooks
exclude: |
  (?x)^(
    \.terragrunt-cache/.*|
    \.terraform/.*|
    \.git/.*|
    node_modules/.*|
    vendor/.*|
    \.idea/.*|
    \.vscode/.*
  )$
